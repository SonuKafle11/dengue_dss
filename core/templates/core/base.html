{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Dengue DSS{% endblock %}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        h1, h2, h3 {
            margin-bottom: 10px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 10px;
        }

        table, th, td {
            border: 1px solid black;
        }

        th, td {
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
        }

        button {
            padding: 5px 10px;
            cursor: pointer;
        }

        a {
            text-decoration: none;
            color: blue;
        }
    </style>
</head>

<body>

{% if messages %}
    {% for msg in messages %}
        <p><strong>{{ msg }}</strong></p>
    {% endfor %}
{% endif %}

{% block content %}{% endblock %}
<script src="{% static 'js/main.js' %}"></script>
</body>
</html>
